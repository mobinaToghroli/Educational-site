<!DOCTYPE html>
<html lang="fa" dir="rtl" class="font-vazir">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ورود به سیستم - سیستم جامع دانشگاهی گلستان</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/globals.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            vazir: ['"Vazirmatn"', 'sans-serif'],
          },
        },
      },
    }
  </script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-500 to-purple-600 dark:from-slate-800 dark:to-slate-900 p-4">
  <div class="w-full max-w-md bg-white dark:bg-slate-800 rounded-2xl shadow-xl overflow-hidden">
    <div class="p-8">
      <div class="text-center mb-8">
        <div class="mx-auto bg-indigo-100 dark:bg-slate-700 w-16 h-16 rounded-full flex items-center justify-center mb-4">
          <svg class="h-8 w-8 text-indigo-600 dark:text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
          </svg>
        </div>
        <h2 class="text-2xl font-bold text-gray-800 dark:text-white">ورود به سیستم</h2>
        <p class="text-gray-600 dark:text-gray-300 mt-2">لطفا اطلاعات حساب کاربری خود را وارد کنید</p>
      </div>

      <form id="login-form" class="space-y-4">
        <div>
          <label for="userId" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
            شناسه کاربری
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
            </div>
            <input
              id="userId"
              type="text"
              class="rtl-input block w-full pr-3 pl-10 py-3 border border-gray-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-gray-900 dark:text-white focus:ring-indigo-500 focus:border-indigo-500"
              placeholder="شماره دانشجویی خود را وارد کنید"
              required
            />
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
            گذرواژه
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
              </svg>
            </div>
            <input
              id="password"
              type="password"
              class="rtl-input block w-full pr-3 pl-10 py-3 border border-gray-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-gray-900 dark:text-white focus:ring-indigo-500 focus:border-indigo-500"
              placeholder="گذرواژه خود را وارد کنید"
              required
            />
          </div>
        </div>

        <div>
          <label for="captcha" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
            کد امنیتی
          </label>
          <div class="flex space-x-2 space-x-reverse">
            <input
              id="captcha"
              type="text"
              class="rtl-input flex-1 py-3 border border-gray-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-gray-900 dark:text-white focus:ring-indigo-500 focus:border-indigo-500"
              placeholder="کد را وارد کنید"
              required
            />
            <div id="captcha-display" class="flex items-center justify-center w-24 bg-gray-200 dark:bg-slate-700 rounded-lg font-bold text-gray-800 dark:text-white">
              <!-- Captcha will be generated by JS -->
            </div>
          </div>
          <p class="mt-2 text-sm text-gray-500 dark:text-gray-400">
            کد امنیتی را وارد کنید
          </p>
        </div>

        <div class="flex items-center justify-between">
          <div class="flex items-center">
            <input
              id="remember-me"
              name="remember-me"
              type="checkbox"
              class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded"
            />
            <label for="remember-me" class="mr-2 block text-sm text-gray-700 dark:text-gray-300">
              مرا به خاطر بسپار
            </label>
          </div>
          <div class="text-sm">
            <a href="#" class="font-medium text-indigo-600 hover:text-indigo-500 dark:text-indigo-400 dark:hover:text-indigo-300">
              رمز عبور را فراموش کرده‌اید؟
            </a>
          </div>
        </div>

        <button
          type="submit"
          class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors"
        >
          ورود به سیستم
          <svg class="mr-2 h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
        </button>
      </form>

      <div class="mt-6 text-center">
        <p class="text-sm text-gray-600 dark:text-gray-400">
          نیاز به کمک دارید؟{' '}
          <a href="#" class="font-medium text-indigo-600 hover:text-indigo-500 dark:text-indigo-400 dark:hover:text-indigo-300">
            تماس با پشتیبانی
          </a>
        </p>
      </div>
    </div>
  </div>

  <script src="js/theme.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
